<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>細胞倍增時間計算器 (含千分位與科學記號)</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary:   #3b82f6;
      --primary-dark: #2563eb;
      --success:   #10b981;
      --danger:    #ef4444;
      --bg:        #f0f4f8;
      --card:      #ffffff;
      --border:    #d1d5db;
      --text:      #1e293b;
      --muted:     #64748b;
      --radius:    12px;
    }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--primary-dark);
    }

    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 520px;
      padding: 32px 36px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .field label .unit {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: 4px;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--text);
      background: #f8fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      background: #fff;
    }

    .field input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }

    .field .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .derived-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .derived-row .field {
      flex: 1;
      margin-bottom: 0;
    }

    .derived-row input[readonly] {
      background: #f1f5f9;
      color: var(--muted);
      cursor: default;
    }

    .derived-badge {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--primary);
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
      margin-top: 22px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .btn-calculate {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    .btn-calculate:hover {
      background: var(--primary-dark);
    }

    .btn-calculate:active {
      transform: scale(0.98);
    }

    .btn-reset {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-reset:hover {
      background: #f1f5f9;
      color: var(--text);
    }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--danger);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .error-msg.visible {
      display: block;
    }

    .results {
      display: none;
      margin-top: 24px;
    }

    .results.visible {
      display: block;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .result-card {
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .result-card.highlight {
      background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      border-color: var(--primary);
    }

    .result-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--primary-dark);
      line-height: 1.2;
    }

    .result-value sub, .result-value sup {
      font-size: 0.6em;
    }

    .result-unit {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .result-card.full-width {
      grid-column: 1 / -1;
    }

    .formula-note {
      margin-top: 20px;
      padding: 12px 16px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #78350f;
      line-height: 1.7;
    }

    .formula-note strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #92400e;
    }

    footer {
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>細胞倍增時間計算器</h1>
    <p>Cell Doubling Time Calculator</p>
  </header>

  <div class="card">

    <div class="section-title">輸入參數</div>

    <div class="field">
      <label for="n0">
        初始細胞數目 (N₀)
        <span class="unit">cells</span>
      </label>
      <input type="text" id="n0" placeholder="例如: 1,000,000" />
      <div class="hint">支援科學記號 (如 1e6) 與千分位</div>
    </div>

    <div class="field">
      <label for="conc">
        最終細胞濃度
        <span class="unit">cells/mL</span>
      </label>
      <input type="text" id="conc" placeholder="例如: 5,000,000" />
    </div>

    <div class="field">
      <label for="vol">
        培養體積
        <span class="unit">mL</span>
      </label>
      <input type="text" id="vol" placeholder="例如: 10" />
    </div>

    <div class="derived-row">
      <div class="field">
        <label for="nt_display">
          最終細胞數目 (Nₜ)
          <span class="unit">cells</span>
        </label>
        <input type="text" id="nt_display" readonly placeholder="自動計算" />
      </div>
      <span class="derived-badge">自動計算</span>
    </div>

    <div class="field">
      <label for="time">
        培養時間 (t)
        <span class="unit">小時</span>
      </label>
      <input type="text" id="time" placeholder="例如: 24" />
    </div>

    <hr class="divider" />

    <button class="btn-calculate" onclick="calculate()">計算倍增時間</button>
    <button class="btn-reset" onclick="resetForm()">重置</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="results" id="results">
      <div class="section-title" style="margin-top:0;">計算結果</div>

      <div class="result-grid">
        <div class="result-card highlight full-width">
          <div class="result-label">倍增時間 (Doubling Time)</div>
          <div class="result-value" id="res-dt">—</div>
          <div class="result-unit">小時 (hours)</div>
        </div>

        <div class="result-card">
          <div class="result-label">最終細胞數 (Nₜ)</div>
          <div class="result-value" id="res-nt">—</div>
          <div class="result-unit">cells</div>
        </div>

        <div class="result-card">
          <div class="result-label">倍增次數 (n)</div>
          <div class="result-value" id="res-n">—</div>
          <div class="result-unit">次</div>
        </div>
      </div>

      <div class="formula-note">
        <strong>計算公式</strong>
        Nₜ = 濃度 × 體積<br>
        倍增時間 DT = (t × ln 2) / ln(Nₜ / N₀)<br>
        倍增次數 n = log₂(Nₜ / N₀)
      </div>
    </div>

  </div>

  <footer>僅供研究參考使用 · For Research Use Only</footer>

  <script>
    const $ = id => document.getElementById(id);

    // 解析輸入值（移除逗號並轉為數字）
    function parseInput(val) {
      if (!val) return null;
      const cleanVal = val.replace(/,/g, '').trim();
      if (cleanVal === '') return null;
      const num = Number(cleanVal);
      return isNaN(num) ? null : num;
    }

    // 格式化數字為千分位字串
    function formatWithCommas(val) {
      if (val === null || val === undefined || val === '') return '';
      // 處理科學記號：如果包含 'e'，不進行千分位格式化以避免破壞格式
      if (val.toString().toLowerCase().includes('e')) return val;
      
      const cleanVal = val.toString().replace(/,/g, '');
      const num = Number(cleanVal);
      if (isNaN(num)) return val;

      const parts = cleanVal.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return parts.join('.');
    }

    // 格式化顯示為 10 的 N 次方 (HTML)
    function formatScientificHTML(n) {
      if (n === 0) return '0';
      if (Math.abs(n) < 1000000 && Math.abs(n) >= 0.01) {
        return n.toLocaleString('zh-TW', { maximumFractionDigits: 2 });
      }
      
      const str = n.toExponential(2);
      const parts = str.split('e');
      const base = parts[0];
      const exp = parseInt(parts[1]);
      
      return `${base} × 10<sup>${exp}</sup>`;
    }

    // 輸入欄位的即時格式化處理
    function handleInputFormatting(e) {
      const input = e.target;
      const originalValue = input.value;
      
      // 如果正在輸入科學記號，不進行即時格式化
      if (originalValue.toLowerCase().includes('e')) {
        updateNt();
        return;
      }

      // 記錄游標位置
      const cursorPosition = input.selectionStart;
      const oldLength = originalValue.length;

      const num = parseInput(originalValue);
      if (num !== null) {
        const formatted = formatWithCommas(originalValue);
        input.value = formatted;

        // 調整游標位置
        const newLength = formatted.length;
        const newPosition = cursorPosition + (newLength - oldLength);
        input.setSelectionRange(newPosition, newPosition);
      }
      
      updateNt();
    }

    function updateNt() {
      const conc = parseInput($('conc').value);
      const vol  = parseInput($('vol').value);
      if (conc !== null && vol !== null && conc >= 0 && vol >= 0) {
        const nt = conc * vol;
        // 最終細胞數顯示在唯讀欄位：若很大則用科學記號，否則用千分位
        $('nt_display').value = nt >= 1e7 ? nt.toExponential(3) : nt.toLocaleString();
      } else {
        $('nt_display').value = '';
      }
    }

    // 綁定事件
    ['n0', 'conc', 'vol', 'time'].forEach(id => {
      $(id).addEventListener('input', handleInputFormatting);
    });

    function showError(msg) {
      const el = $('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
      $('results').classList.remove('visible');
    }

    function clearError() {
      $('errorMsg').classList.remove('visible');
    }

    function calculate() {
      ['n0','conc','vol','time'].forEach(id => $(id).classList.remove('error'));
      clearError();

      const n0   = parseInput($('n0').value);
      const conc = parseInput($('conc').value);
      const vol  = parseInput($('vol').value);
      const t    = parseInput($('time').value);

      if (n0 === null) { $('n0').classList.add('error'); showError('請輸入有效的初始細胞數。'); return; }
      if (conc === null) { $('conc').classList.add('error'); showError('請輸入有效的細胞濃度。'); return; }
      if (vol === null) { $('vol').classList.add('error'); showError('請輸入有效的培養體積。'); return; }
      if (t === null) { $('time').classList.add('error'); showError('請輸入有效的培養時間。'); return; }

      if (n0 <= 0) { $('n0').classList.add('error'); showError('初始細胞數 (N₀) 必須大於 0。'); return; }
      if (conc < 0) { $('conc').classList.add('error'); showError('細胞濃度不可為負數。'); return; }
      if (vol < 0) { $('vol').classList.add('error'); showError('培養體積不可為負數。'); return; }
      if (t <= 0) { $('time').classList.add('error'); showError('培養時間必須大於 0。'); return; }

      const nt = conc * vol;

      if (nt <= n0) {
        showError('最終細胞數 (Nₜ) 必須大於初始細胞數 (N₀)。請檢查輸入的濃度與體積。');
        return;
      }

      const ratio = nt / n0;
      const dt    = (t * Math.LN2) / Math.log(ratio);
      const n     = Math.log2(ratio);

      $('res-dt').textContent = dt.toFixed(2);
      $('res-nt').innerHTML   = formatScientificHTML(nt);
      $('res-n').textContent  = n.toFixed(2);

      $('results').classList.add('visible');
      $('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function resetForm() {
      ['n0','conc','vol','time','nt_display'].forEach(id => {
        $(id).value = '';
        $(id).classList.remove('error');
      });
      clearError();
      $('results').classList.remove('visible');
    }

    // 支援 Enter 鍵
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') calculate();
      });
    });
  </script>
</body>
</html>
